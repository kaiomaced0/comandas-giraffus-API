%dev.quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# configurando Banco de Dados
%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=postgres
%dev.quarkus.datasource.password=123456
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/comandasdb
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=postgres
%prod.quarkus.datasource.password=123456
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/comandasdb

# configurando jwt
mp.jwt.verify.publickey.location=token/publicKey.pem
mp.jwt.verify.issuer=kaioprojects-jwt
smallrye.jwt.sign.key.location=token/privateKey.pem

quarkus.security.jaxrs.deny-unannotated-endpoints=true

# MinIO (storage de documentos) - credenciais via variaveis de ambiente
comandas.minio.url=${MINIO_SERVER_URL:http://localhost:9000}
comandas.minio.access-key=${MINIO_ROOT_USER:admin}
comandas.minio.secret-key=${MINIO_ROOT_PASSWORD:password}
comandas.minio.bucket=${MINIO_BUCKET:comandas}

quarkus.http.port=${PORT:8080}

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173,http://localhost:5174,http://localhost:3000
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Accept
quarkus.http.cors.exposed-headers=Authorization
quarkus.http.cors.access-control-max-age=24H

quarkus.log.category."k.service".level=DEBUG

# Configuracao de log em arquivo
quarkus.log.file.path=/tmp/trace.log
quarkus.log.file.level=TRACE
quarkus.log.file.format=%d{dd-MM-yyyy HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.file.rotation.file-suffix=.dd-MM-yyyy-HH-mm
